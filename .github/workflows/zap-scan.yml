name: Dynamic Analysis (OWASP ZAP)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  zap-baseline:
    runs-on: ubuntu-latest

    env:
      UPTIME_KUMA_URLS: https://example.kuma-mieru.invalid/status/default
      KUMA_MIERU_TITLE: Kuma Mieru
      KUMA_MIERU_DESCRIPTION: Test instance for dynamic analysis
      NODE_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build

      - name: Start application
        run: |
          bun run start &
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200\|307"; then
              echo "Application is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Application failed to start"
          exit 1

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --network host -v $(pwd)/zap-reports:/zap/wrk:rw \
            -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:3000 \
            -r zap-report.html \
            -J zap-report.json \
            -w zap-report.md \
            || echo "ZAP finished with warnings or errors"

      - name: Stop application
        if: always()
        run: kill $(pgrep -f 'bun .*/server.js') || true

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: zap-reports/
